<!DOCTYPE html>

        </div>
        <pre>
Mim   Re Sol
Madre de Dios,
      Re              Mim
danos el espíritu de amor.
         Sim
Danos la fuerza
Do              Lam Re Mim
que nos lleva hasta Jesús.
